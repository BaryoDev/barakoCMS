name: CI

on:
  push:
    branches-ignore:
      - master
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: ["master"]

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test BarakoCMS.Tests
        run: dotnet test BarakoCMS.Tests/BarakoCMS.Tests.csproj --no-build --configuration Release --verbosity normal --logger "console;verbosity=detailed"
        env:
          # TestContainers needs Docker to be available
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Test Summary
        if: always()
        run: |
          echo "## Backend" >> $GITHUB_STEP_SUMMARY
          echo "✅ BarakoCMS.Tests completed" >> $GITHUB_STEP_SUMMARY

  admin:
    name: Admin UI (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npm run build

      # End-to-end regression suite — drives the real UI (mocked API) to catch the class of bug unit
      # tests miss: empty-vs-error states, routing, forms. Scoped to regressions.spec for now; the
      # older e2e specs have drifted and are tracked separately.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E (regressions)
        run: npx playwright test regressions.spec.ts --project=chromium

      - name: Admin Summary
        if: always()
        run: |
          echo "## Admin UI" >> $GITHUB_STEP_SUMMARY
          echo "✅ lint, typecheck, vitest, production build, and E2E regressions completed" >> $GITHUB_STEP_SUMMARY
