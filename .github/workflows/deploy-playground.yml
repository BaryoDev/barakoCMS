name: Deploy Playground

# Playground only, on purpose. The club (club.baryo.dev) is deployed by hand:
# it has real members on it and should not share a blast radius with a showcase
# site. See docs/deployment for the manual club steps.

on:
  push:
    branches: ["master"]
    paths:
      - "admin/**"
      - ".github/workflows/deploy-playground.yml"
  workflow_dispatch:

# One deploy at a time. Queue rather than cancel — a half-applied deploy is
# worse than a slow one.
concurrency:
  group: deploy-playground
  cancel-in-progress: false

jobs:
  # CI skips pushes to master (it runs on PRs), so re-check here rather than
  # assume. Cheap: no production build, that happens inside the image.
  verify:
    name: Verify admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npx vitest run

  build:
    name: Build and push image
    needs: verify
    # Native arm64 — the Oracle VM is Ampere, and the existing amd64-only
    # images cannot run there. Free for public repositories; emulating arm64
    # through QEMU would turn a two-minute Next build into twenty.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # NEXT_BASE_PATH is baked at build time, so the playground image is not
      # interchangeable with the club one (/barakocms vs /cms). Hence the
      # dedicated tag rather than :latest.
      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          file: admin/Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            NEXT_BASE_PATH=/barakocms
            NEXT_PUBLIC_API_URL=https://playground.baryo.dev/barakocms-api
          tags: |
            ghcr.io/baryodev/barako-admin:playground
            ghcr.io/baryodev/barako-admin:playground-${{ github.sha }}
          labels: org.opencontainers.image.source=https://github.com/BaryoDev/barakoCMS
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to playground
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: playground
      url: https://playground.baryo.dev/barakocms
    steps:
      # The key is pinned to a forced command in the VM's authorized_keys, so
      # whatever we send here is ignored and /home/opc/deploy-playground-admin.sh
      # runs instead. A leaked key cannot open a shell. The script pulls
      # :playground, recreates the container, and fails if it does not answer
      # with 200 within 30s.
      - name: Pull and restart admin over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.PLAYGROUND_DEPLOY_KEY }}
          command_timeout: 5m
          script: deploy

      - name: Verify from the public URL
        run: |
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              https://playground.baryo.dev/barakocms || true)
            if [ "$code" = "200" ]; then
              echo "playground responded 200 after ${i} attempt(s)"
              exit 0
            fi
            sleep 3
          done
          echo "playground did not return 200 (last: ${code:-none})" >&2
          exit 1

      - name: Summary
        if: always()
        run: |
          {
            echo "## Playground deploy"
            echo ""
            echo "- image: \`ghcr.io/baryodev/barako-admin:playground-${{ github.sha }}\`"
            echo "- url: https://playground.baryo.dev/barakocms"
            echo "- result: ${{ job.status }}"
            echo ""
            echo "Roll back by retagging a previous \`playground-<sha>\` to \`:playground\` and re-running this workflow."
          } >> "$GITHUB_STEP_SUMMARY"
