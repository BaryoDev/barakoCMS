name: Docker Deploy Only

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Version tag for Docker images'
                required: true
                default: '2.1.4'

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            # ghcr.io is the primary registry — authenticated with the built-in GITHUB_TOKEN.
            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # Docker Hub is an optional mirror; broken/missing creds can't fail the run.
            - name: Login to Docker Hub (optional mirror)
              id: dockerhub
              continue-on-error: true
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            # barako-cms is the full "Barako" suite (core + every module). Build it from
            # Dockerfile.suite, matching nuget-publish.yml — plain Dockerfile is core-only and would
            # ship an image missing Accounting, Analytics, and the rest.
            - name: Build and push API (full suite)
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: Dockerfile.suite
                  push: true
                  tags: |
                      ghcr.io/baryodev/barako-cms:latest
                      ghcr.io/baryodev/barako-cms:${{ github.event.inputs.version }}
                  labels: org.opencontainers.image.source=https://github.com/BaryoDev/barakoCMS

            - name: Build and push Admin UI
              uses: docker/build-push-action@v5
              with:
                  context: ./admin
                  file: admin/Dockerfile
                  push: true
                  tags: |
                      ghcr.io/baryodev/barako-admin:latest
                      ghcr.io/baryodev/barako-admin:${{ github.event.inputs.version }}
                  labels: org.opencontainers.image.source=https://github.com/BaryoDev/barakoCMS

            # Mirror to Docker Hub without rebuilding, only when its login above succeeded.
            - name: Mirror images to Docker Hub
              if: steps.dockerhub.outcome == 'success'
              run: |
                  V="${{ github.event.inputs.version }}"
                  for img in barako-cms barako-admin; do
                    docker buildx imagetools create \
                      --tag "arnelirobles/$img:latest" \
                      --tag "arnelirobles/$img:$V" \
                      "ghcr.io/baryodev/$img:$V"
                  done
