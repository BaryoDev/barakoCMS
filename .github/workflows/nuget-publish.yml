name: NuGet Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 2.2.0)'
        required: true
        default: '2.2.0'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test BarakoCMS.Tests
        run: dotnet test BarakoCMS.Tests/BarakoCMS.Tests.csproj --no-build --configuration Release --verbosity normal --logger "console;verbosity=detailed"
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Update Version in csproj
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          CSPROJ_PATH="barakoCMS/barakoCMS.csproj"
          NEW_VERSION="${{ github.event.inputs.version }}"
          CURRENT_VERSION=$(sed -n 's/.*<Version>\(.*\)<\/Version>.*/\1/p' "$CSPROJ_PATH" | head -n 1)

          echo "Current Version: $CURRENT_VERSION"
          echo "New Version: $NEW_VERSION"

          # Replace version in file
          sed -i "s|<Version>$CURRENT_VERSION</Version>|<Version>$NEW_VERSION</Version>|" "$CSPROJ_PATH"

          # Commit version change
          git add "$CSPROJ_PATH"
          git commit -m "chore: Bump version to $NEW_VERSION [skip ci]" || echo "No changes to commit"
          git push || echo "Nothing to push"

      - name: Restore and Build
        run: |
          dotnet restore
          dotnet build barakoCMS/barakoCMS.csproj --no-restore --configuration Release

      - name: Pack NuGet
        run: dotnet pack barakoCMS/barakoCMS.csproj --no-build --configuration Release -o out

      - name: Pack modules
        # Modules reference barakoCMS by project, so they pick up the version bumped above.
        # Built here (no --no-build) since only the core project was compiled earlier.
        run: |
          for m in BarakoCMS.Accounting BarakoCMS.Import BarakoCMS.Files BarakoCMS.Email.Resend BarakoCMS.DeviceTrust BarakoCMS.ExternalAuth BarakoCMS.FeatureFlags BarakoCMS.Portability BarakoCMS.Diagnostics BarakoCMS.Analytics.Umami; do
            dotnet pack "$m/$m.csproj" --configuration Release -o out
          done

      - name: Publish to NuGet.org
        run: dotnet nuget push "out/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      # Mirror to GitHub Packages (authenticated with the built-in GITHUB_TOKEN — no external secret).
      - name: Publish to GitHub Packages
        run: dotnet nuget push "out/*.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/BaryoDev/index.json --skip-duplicate

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ghcr.io is the primary registry — authenticated with the built-in GITHUB_TOKEN, so there are
      # no external secrets to expire (this job already grants packages: write).
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub is an optional mirror. continue-on-error means missing/expired Docker Hub creds
      # can't fail the publish — ghcr still gets every image.
      - name: Login to Docker Hub (optional mirror)
        id: dockerhub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Barako (full suite → barako-cms)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.suite
          push: true
          tags: |
            ghcr.io/baryodev/barako-cms:latest
            ghcr.io/baryodev/barako-cms:${{ github.event.inputs.version }}
          labels: org.opencontainers.image.source=https://github.com/BaryoDev/barakoCMS

      - name: Build and push Decaf (core → barako-cms-decaf)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/baryodev/barako-cms-decaf:latest
            ghcr.io/baryodev/barako-cms-decaf:${{ github.event.inputs.version }}
          labels: org.opencontainers.image.source=https://github.com/BaryoDev/barakoCMS

      - name: Build and push Admin UI
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          file: admin/Dockerfile
          push: true
          tags: |
            ghcr.io/baryodev/barako-admin:latest
            ghcr.io/baryodev/barako-admin:${{ github.event.inputs.version }}
          labels: org.opencontainers.image.source=https://github.com/BaryoDev/barakoCMS

      # Mirror the freshly-pushed ghcr images to Docker Hub without rebuilding (imagetools copies the
      # manifest + layers). Skipped automatically when the Docker Hub login above didn't succeed.
      - name: Mirror images to Docker Hub
        if: steps.dockerhub.outcome == 'success'
        run: |
          V="${{ github.event.inputs.version }}"
          for img in barako-cms barako-cms-decaf barako-admin; do
            docker buildx imagetools create \
              --tag "arnelirobles/$img:latest" \
              --tag "arnelirobles/$img:$V" \
              "ghcr.io/baryodev/$img:$V"
          done

  # Announce the release to the org discussions via the shared reusable workflow.
  announce:
    needs: publish
    uses: BaryoDev/.github/.github/workflows/announce.yml@main
    with:
      package: "barakoCMS suite"
      version: ${{ github.event.inputs.version }}
      notes: "Published barakoCMS ${{ github.event.inputs.version }}: core + modules to NuGet.org and GitHub Packages, and Docker images (barako-cms, barako-cms-decaf, barako-admin) to ghcr.io."
      install: "dotnet add package BarakoCMS.Accounting --version ${{ github.event.inputs.version }}"
    secrets:
      ANNOUNCE_TOKEN: ${{ secrets.ANNOUNCE_TOKEN }}
